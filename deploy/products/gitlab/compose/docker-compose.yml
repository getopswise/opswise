services:
  gitlab:
    image: gitlab/gitlab-ce:${GITLAB_VERSION:-16.11.0}-ce.0
    container_name: gitlab
    restart: unless-stopped
    hostname: ${GITLAB_DOMAIN:-gitlab.example.com}
    ports:
      - "${GITLAB_PORT:-80}:80"
      - "443:443"
      - "${GITLAB_SSH_PORT:-2222}:22"
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url '${GITLAB_EXTERNAL_URL:-http://gitlab.example.com}'
        gitlab_rails['initial_root_password'] = '${GITLAB_ROOT_PASSWORD:-changeme}'
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_SSH_PORT:-2222}
        puma['worker_processes'] = ${GITLAB_PUMA_WORKERS:-2}
        sidekiq['max_concurrency'] = ${GITLAB_SIDEKIQ_CONCURRENCY:-10}
        postgresql['shared_buffers'] = '${GITLAB_SHARED_BUFFERS:-256MB}'
    volumes:
      - gitlab_config:${GITLAB_CONFIG_DIR:-/etc/gitlab}
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:${GITLAB_DATA_DIR:-/var/opt/gitlab}
    shm_size: '256m'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/-/readiness"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

volumes:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
