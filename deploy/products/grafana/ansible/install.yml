---
- name: Install Grafana
  hosts: all
  become: true
  vars:
    grafana_version: "10.4.0"
    grafana_port: 3000
    grafana_admin_user: admin
    grafana_admin_password: "changeme"
    grafana_data_dir: /var/lib/grafana
    grafana_log_dir: /var/log/grafana
    grafana_plugins_dir: /var/lib/grafana/plugins
    grafana_provisioning_dir: /etc/grafana/provisioning
    grafana_log_mode: "console file"
    grafana_log_level: info
    grafana_allow_sign_up: false
  tasks:
    - name: Install required dependencies
      apt:
        name:
          - apt-transport-https
          - software-properties-common
          - wget
          - gnupg2
        state: present
        update_cache: true

    - name: Ensure keyrings directory exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Grafana GPG key
      shell: |
        wget -q -O - https://apt.grafana.com/gpg.key | gpg --dearmor -o /etc/apt/keyrings/grafana.gpg
      args:
        creates: /etc/apt/keyrings/grafana.gpg

    - name: Set GPG key permissions
      file:
        path: /etc/apt/keyrings/grafana.gpg
        mode: "0644"

    - name: Add Grafana APT repository
      copy:
        dest: /etc/apt/sources.list.d/grafana.list
        content: "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main\n"
        mode: "0644"

    - name: Install Grafana package (pinned version)
      apt:
        name: "grafana={{ grafana_version }}"
        state: present
        update_cache: true

    - name: Ensure Grafana data directory exists
      file:
        path: "{{ grafana_data_dir }}"
        state: directory
        owner: grafana
        group: grafana
        mode: "0755"

    - name: Ensure Grafana log directory exists
      file:
        path: "{{ grafana_log_dir }}"
        state: directory
        owner: grafana
        group: grafana
        mode: "0755"

    - name: Ensure Grafana plugins directory exists
      file:
        path: "{{ grafana_plugins_dir }}"
        state: directory
        owner: grafana
        group: grafana
        mode: "0755"

    - name: Ensure provisioning directories exist
      file:
        path: "{{ grafana_provisioning_dir }}/{{ item }}"
        state: directory
        owner: grafana
        group: grafana
        mode: "0755"
      loop:
        - datasources
        - dashboards
        - notifiers

    - name: Template grafana.ini configuration
      copy:
        dest: /etc/grafana/grafana.ini
        content: |
          # Managed by Opswise Deploy - do not edit manually

          [paths]
          data = {{ grafana_data_dir }}
          logs = {{ grafana_log_dir }}
          plugins = {{ grafana_plugins_dir }}
          provisioning = {{ grafana_provisioning_dir }}

          [server]
          http_port = {{ grafana_port }}
          protocol = http

          [security]
          admin_user = {{ grafana_admin_user }}
          admin_password = {{ grafana_admin_password }}
          disable_initial_admin_creation = false

          [users]
          allow_sign_up = {{ grafana_allow_sign_up }}

          [auth.anonymous]
          enabled = false

          [log]
          mode = {{ grafana_log_mode }}
          level = {{ grafana_log_level }}

          [analytics]
          reporting_enabled = false
          check_for_updates = false
          check_for_plugin_updates = false
        owner: root
        group: grafana
        mode: "0640"
      notify: Restart grafana-server

    - name: Enable and start grafana-server
      systemd:
        name: grafana-server
        daemon_reload: true
        enabled: true
        state: started

    - name: Wait for Grafana to be available
      wait_for:
        port: "{{ grafana_port }}"
        host: 127.0.0.1
        delay: 3
        timeout: 60
        state: started

    - name: Verify Grafana health endpoint
      uri:
        url: "http://127.0.0.1:{{ grafana_port }}/api/health"
        method: GET
        status_code: 200
      retries: 5
      delay: 3
      register: grafana_health
      until: grafana_health.status == 200

  handlers:
    - name: Restart grafana-server
      systemd:
        name: grafana-server
        state: restarted
