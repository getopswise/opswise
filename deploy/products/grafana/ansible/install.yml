---
- name: Install Grafana
  hosts: all
  become: true
  vars:
    grafana_version: "10.4.0"
    grafana_port: 3000
    grafana_admin_user: admin
    grafana_admin_password: "changeme"
    grafana_data_dir: /var/lib/grafana
  tasks:
    - name: Install dependencies
      apt:
        name:
          - apt-transport-https
          - software-properties-common
          - wget
        state: present
        update_cache: true

    - name: Add Grafana GPG key
      shell: |
        wget -q -O - https://apt.grafana.com/gpg.key | gpg --dearmor -o /etc/apt/keyrings/grafana.gpg
      args:
        creates: /etc/apt/keyrings/grafana.gpg

    - name: Add Grafana repository
      copy:
        dest: /etc/apt/sources.list.d/grafana.list
        content: "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main\n"

    - name: Install Grafana
      apt:
        name: "grafana={{ grafana_version }}"
        state: present
        update_cache: true

    - name: Configure Grafana port
      lineinfile:
        path: /etc/grafana/grafana.ini
        regexp: "^;?http_port"
        line: "http_port = {{ grafana_port }}"
        section: server

    - name: Configure Grafana admin user
      lineinfile:
        path: /etc/grafana/grafana.ini
        regexp: "^;?admin_user"
        line: "admin_user = {{ grafana_admin_user }}"
        section: security

    - name: Configure Grafana admin password
      lineinfile:
        path: /etc/grafana/grafana.ini
        regexp: "^;?admin_password"
        line: "admin_password = {{ grafana_admin_password }}"
        section: security

    - name: Ensure data directory exists
      file:
        path: "{{ grafana_data_dir }}"
        state: directory
        owner: grafana
        group: grafana

    - name: Enable and start Grafana
      systemd:
        name: grafana-server
        enabled: true
        state: started
