---
- name: Uninstall Grafana
  hosts: all
  become: true
  vars:
    grafana_remove_data: false
    grafana_data_dir: /var/lib/grafana
    grafana_log_dir: /var/log/grafana
  tasks:
    - name: Stop and disable grafana-server
      systemd:
        name: grafana-server
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Remove Grafana package
      apt:
        name: grafana
        state: absent
        purge: true

    - name: Remove Grafana APT repository
      file:
        path: /etc/apt/sources.list.d/grafana.list
        state: absent

    - name: Remove Grafana GPG key
      file:
        path: /etc/apt/keyrings/grafana.gpg
        state: absent

    - name: Remove Grafana configuration directory
      file:
        path: /etc/grafana
        state: absent

    - name: Remove Grafana data directory
      file:
        path: "{{ grafana_data_dir }}"
        state: absent
      when: grafana_remove_data | bool

    - name: Remove Grafana log directory
      file:
        path: "{{ grafana_log_dir }}"
        state: absent
      when: grafana_remove_data | bool

    - name: Update APT cache
      apt:
        update_cache: true
