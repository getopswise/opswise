services:
  harbor:
    image: goharbor/harbor-core:v${HARBOR_VERSION:-2.10.0}
    container_name: harbor
    restart: unless-stopped
    ports:
      - "${HARBOR_PORT:-8080}:8080"
    environment:
      HARBOR_ADMIN_PASSWORD: ${HARBOR_ADMIN_PASSWORD:-changeme}
    volumes:
      - harbor_data:/data

volumes:
  harbor_data:
