# Helm values for grafana/loki chart (single-binary mode)
# Chart: https://grafana.com/docs/loki/latest/setup/install/helm/
# Install: helm install loki grafana/loki -f values.yaml

deploymentMode: SingleBinary

loki:
  auth_enabled: false

  server:
    http_listen_port: 3100

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 10Gi

# Disable gateway - use direct access
gateway:
  enabled: false

# Disable monitoring/self-monitoring for simplicity
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

test:
  enabled: false
