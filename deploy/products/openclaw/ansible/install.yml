---
- name: Install OpenClaw
  hosts: all
  become: true
  vars:
    openclaw_version: latest
    openclaw_port: 18789
    openclaw_node_version: 22
  tasks:
    - name: Install prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Add NodeSource GPG key
      shell: |
        curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
      args:
        creates: /usr/share/keyrings/nodesource.gpg

    - name: Add NodeSource repository
      copy:
        dest: /etc/apt/sources.list.d/nodesource.list
        content: |
          deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ openclaw_node_version }}.x nodistro main
        mode: "0644"

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Install OpenClaw via npm
      command: npm install -g openclaw@{{ openclaw_version }}
      register: npm_install
      changed_when: "'added' in npm_install.stdout"

    - name: Create openclaw system user
      user:
        name: openclaw
        system: true
        shell: /usr/sbin/nologin
        create_home: true
        home: /home/openclaw

    - name: Create systemd service for OpenClaw
      copy:
        dest: /etc/systemd/system/openclaw.service
        content: |
          [Unit]
          Description=OpenClaw Personal AI Assistant
          After=network.target

          [Service]
          Type=simple
          User=openclaw
          Group=openclaw
          Environment=PORT={{ openclaw_port }}
          ExecStart=/usr/bin/openclaw gateway
          Restart=on-failure
          RestartSec=10
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
        mode: "0644"
      notify: Restart openclaw

    - name: Enable and start OpenClaw service
      systemd:
        name: openclaw
        daemon_reload: true
        enabled: true
        state: started

    - name: Wait for OpenClaw gateway to be available
      wait_for:
        port: "{{ openclaw_port }}"
        host: 0.0.0.0
        delay: 5
        timeout: 60
        state: started

  handlers:
    - name: Restart openclaw
      systemd:
        name: openclaw
        state: restarted
