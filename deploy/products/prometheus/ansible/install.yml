---
- name: Install Prometheus
  hosts: all
  become: true
  vars:
    prometheus_version: "3.10.0"
    prometheus_port: 9090
    prometheus_data_dir: /var/lib/prometheus
    prometheus_config_dir: /etc/prometheus
    prometheus_retention: "15d"
    prometheus_user: prometheus
    prometheus_group: prometheus
    prometheus_arch: "amd64"
    prometheus_download_url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-{{ prometheus_arch }}.tar.gz"
    prometheus_tarball: "/tmp/prometheus-{{ prometheus_version }}.linux-{{ prometheus_arch }}.tar.gz"
    prometheus_extract_dir: "/tmp/prometheus-{{ prometheus_version }}.linux-{{ prometheus_arch }}"

  tasks:
    # ----------------------------------------------------------------
    # User and group setup
    # ----------------------------------------------------------------
    - name: Create prometheus group
      group:
        name: "{{ prometheus_group }}"
        system: true
        state: present

    - name: Create prometheus user
      user:
        name: "{{ prometheus_user }}"
        group: "{{ prometheus_group }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ prometheus_data_dir }}"
        create_home: false

    # ----------------------------------------------------------------
    # Directory setup
    # ----------------------------------------------------------------
    - name: Create Prometheus directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_group }}"
        mode: "0755"
      loop:
        - "{{ prometheus_config_dir }}"
        - "{{ prometheus_config_dir }}/rules"
        - "{{ prometheus_config_dir }}/file_sd"
        - "{{ prometheus_data_dir }}"

    # ----------------------------------------------------------------
    # Download and install binaries
    # ----------------------------------------------------------------
    - name: Download Prometheus tarball
      get_url:
        url: "{{ prometheus_download_url }}"
        dest: "{{ prometheus_tarball }}"
        mode: "0644"
      register: prometheus_download

    - name: Extract Prometheus tarball
      unarchive:
        src: "{{ prometheus_tarball }}"
        dest: /tmp
        remote_src: true
      when: prometheus_download.changed

    - name: Install prometheus and promtool binaries
      copy:
        src: "{{ prometheus_extract_dir }}/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        remote_src: true
        owner: root
        group: root
        mode: "0755"
      loop:
        - prometheus
        - promtool
      notify: restart prometheus

    - name: Install console templates and libraries
      copy:
        src: "{{ prometheus_extract_dir }}/{{ item }}"
        dest: "{{ prometheus_config_dir }}/{{ item }}"
        remote_src: true
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_group }}"
        mode: "0755"
        directory_mode: "0755"
      loop:
        - consoles
        - console_libraries

    # ----------------------------------------------------------------
    # Configuration
    # ----------------------------------------------------------------
    - name: Create Prometheus configuration file
      copy:
        dest: "{{ prometheus_config_dir }}/prometheus.yml"
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_group }}"
        mode: "0644"
        content: |
          # Prometheus configuration - managed by Opswise Deploy
          global:
            scrape_interval: 15s
            evaluation_interval: 15s
            scrape_timeout: 10s

          # Alertmanager configuration (uncomment and configure as needed)
          # alerting:
          #   alertmanagers:
          #     - static_configs:
          #         - targets:
          #           - localhost:9093

          # Rule files (place .rules.yml files in {{ prometheus_config_dir }}/rules/)
          rule_files:
            - "rules/*.rules.yml"

          # Scrape configurations
          scrape_configs:
            - job_name: "prometheus"
              static_configs:
                - targets: ["localhost:{{ prometheus_port }}"]

            # File-based service discovery (place .json or .yml files in file_sd/)
            # - job_name: "file_sd_targets"
            #   file_sd_configs:
            #     - files:
            #         - "file_sd/*.yml"
            #         - "file_sd/*.json"
            #       refresh_interval: 30s
      notify: restart prometheus

    - name: Validate Prometheus configuration
      command: /usr/local/bin/promtool check config {{ prometheus_config_dir }}/prometheus.yml
      changed_when: false

    # ----------------------------------------------------------------
    # Systemd service
    # ----------------------------------------------------------------
    - name: Create Prometheus systemd service file
      copy:
        dest: /etc/systemd/system/prometheus.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Prometheus Monitoring System
          Documentation=https://prometheus.io/docs/
          Wants=network-online.target
          After=network-online.target

          [Service]
          User={{ prometheus_user }}
          Group={{ prometheus_group }}
          Type=simple
          ExecStart=/usr/local/bin/prometheus \
            --config.file={{ prometheus_config_dir }}/prometheus.yml \
            --storage.tsdb.path={{ prometheus_data_dir }} \
            --storage.tsdb.retention.time={{ prometheus_retention }} \
            --web.listen-address=0.0.0.0:{{ prometheus_port }} \
            --web.console.templates={{ prometheus_config_dir }}/consoles \
            --web.console.libraries={{ prometheus_config_dir }}/console_libraries \
            --web.enable-lifecycle
          ExecReload=/bin/kill -HUP $MAINPID
          Restart=on-failure
          RestartSec=5
          LimitNOFILE=65536

          [Install]
          WantedBy=multi-user.target
      notify: restart prometheus

    # ----------------------------------------------------------------
    # Start service
    # ----------------------------------------------------------------
    - name: Reload systemd daemon
      systemd:
        daemon_reload: true

    - name: Enable and start Prometheus service
      systemd:
        name: prometheus
        enabled: true
        state: started

    - name: Wait for Prometheus to be available
      wait_for:
        port: "{{ prometheus_port }}"
        host: 127.0.0.1
        delay: 3
        timeout: 60

    # ----------------------------------------------------------------
    # Cleanup
    # ----------------------------------------------------------------
    - name: Remove downloaded tarball
      file:
        path: "{{ prometheus_tarball }}"
        state: absent

    - name: Remove extracted directory
      file:
        path: "{{ prometheus_extract_dir }}"
        state: absent

  handlers:
    - name: restart prometheus
      systemd:
        name: prometheus
        state: restarted
        daemon_reload: true
