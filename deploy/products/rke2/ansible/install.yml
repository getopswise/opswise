---
- name: Install RKE2 (Kubernetes)
  hosts: all
  become: true
  vars:
    rke2_version: "v1.32.2+rke2r1"
    rke2_type: "server"
    rke2_cni: "canal"
    rke2_token: "changeme"
  tasks:
    - name: Install prerequisites
      apt:
        name:
          - curl
          - bash
        state: present
        update_cache: true

    - name: Run RKE2 install script
      shell: |
        curl -sfL https://get.rke2.io | INSTALL_RKE2_VERSION={{ rke2_version }} INSTALL_RKE2_TYPE={{ rke2_type }} sh -
      args:
        creates: /usr/local/bin/rke2

    - name: Create RKE2 config directory
      file:
        path: /etc/rancher/rke2
        state: directory
        mode: "0755"

    - name: Write RKE2 config
      copy:
        dest: /etc/rancher/rke2/config.yaml
        content: |
          # Managed by Opswise Deploy
          token: {{ rke2_token }}
          cni:
            - {{ rke2_cni }}
        mode: "0600"
      notify: Restart rke2

    - name: Enable and start RKE2 service
      systemd:
        name: "rke2-{{ rke2_type }}.service"
        daemon_reload: true
        enabled: true
        state: started

    - name: Wait for RKE2 to be ready
      wait_for:
        path: /etc/rancher/rke2/rke2.yaml
        timeout: 120
      when: rke2_type == "server"

    - name: Symlink kubectl to /usr/local/bin
      file:
        src: /var/lib/rancher/rke2/bin/kubectl
        dest: /usr/local/bin/kubectl
        state: link
      when: rke2_type == "server"
      ignore_errors: true

    - name: Wait for node to be Ready
      shell: |
        export KUBECONFIG=/etc/rancher/rke2/rke2.yaml
        /var/lib/rancher/rke2/bin/kubectl wait --for=condition=Ready node --all --timeout=120s
      when: rke2_type == "server"
      retries: 3
      delay: 10
      register: node_ready
      until: node_ready.rc == 0

  handlers:
    - name: Restart rke2
      systemd:
        name: "rke2-{{ rke2_type }}.service"
        state: restarted
